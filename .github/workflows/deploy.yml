name: Deploy to Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Step 1: Link project (creates .vercel/project.json with correct IDs)
      - name: Link Vercel project
        run: |
          vercel link \
            --yes \
            --project=fikar-fardan \
            --token=${{ secrets.VERCEL_TOKEN }}

      # Step 2: Pull env vars from Vercel
      - name: Pull Vercel environment
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      # Step 3: Build with Vercel (uses Vercel's build system)
      - name: Build with Vercel
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      # Step 4: Deploy pre-built output
      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOYMENT_URL=$url" >> $GITHUB_ENV
          echo "✅ Deployed to: $url"

      - name: Show live URL
        run: echo "🌐 Live at ${{ env.DEPLOYMENT_URL }}"
